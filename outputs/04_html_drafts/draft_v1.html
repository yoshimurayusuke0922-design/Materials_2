<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>基幹管理システムのご提案 表紙 draft_v1</title>
    <style>
      body { margin: 0; font-family: "Yu Gothic", Meiryo, sans-serif; background: #eef1f5; }
      .cover { position: relative; width: min(1440px, 100vw); aspect-ratio: 16 / 9; margin: 0 auto; background: #f7f7f5; overflow: hidden; }
      .shape { position: absolute; border-radius: 999px; }
      .shape-top { top: -160px; left: 34%; width: 360px; height: 260px; background: rgba(255, 56, 56, 0.22); }
      .shape-right { top: -40px; right: -200px; width: 600px; height: 900px; background: #ff2222; }
      .shape-bottom { bottom: -110px; left: -120px; width: 340px; height: 190px; background: #ff2222; }
      .client { position: absolute; left: 7%; top: 19%; font-size: 24px; font-weight: 700; }
      .hero { position: absolute; left: 6%; top: 28%; width: 58%; background: rgba(255,255,255,0.96); border-radius: 28px; padding: 44px 48px; box-shadow: 0 20px 48px rgba(0,0,0,0.10); }
      .eyebrow { margin: 0 0 18px; color: #ff2828; font-weight: 700; }
      h1 { margin: 0; font-size: 54px; line-height: 1.24; }
      .subtitle { margin: 28px 0 0; font-size: 20px; line-height: 1.8; color: #4d5560; }
      .date { position: absolute; left: 6.8%; bottom: 15%; font-size: 22px; }
      .brand { position: absolute; left: 45%; bottom: 6%; background: rgba(255,255,255,0.95); padding: 16px 22px; box-shadow: 0 12px 24px rgba(0,0,0,0.08); }
      .brand img { display: block; width: 220px; height: auto; }
    </style>
  </head>
  <body>
    <main class="cover">
      <div class="shape shape-top" aria-hidden="true"></div>
      <div class="shape shape-right" aria-hidden="true"></div>
      <div class="shape shape-bottom" aria-hidden="true"></div>
      <header class="client">株式会社三幸 御中</header>
      <section class="hero" aria-labelledby="title">
        <p class="eyebrow">PROPOSAL</p>
        <h1 id="title">
          日常業務の効率化と将来的な展望を見据えた<br />
          基幹管理システムのご提案
        </h1>
        <p class="subtitle">
          物件、入居者、契約、反響対応を<br />
          一つの流れで扱う業務基盤の整備
        </p>
      </section>
      <p class="date">2026年04月26日</p>
      <footer class="brand">
        <img src="../05_final/assets/fieldx_logo_full.png" alt="Field X" />
      </footer>
    </main>
  </body>
</html>
